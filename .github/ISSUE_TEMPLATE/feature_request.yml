name: Feature request
description: Propose a product or workflow improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the user problem or friction clearly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Affected areas
      description: Note whether this affects the installer, backend, extension, Premiere panel, or docs.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add references, screenshots, or alternative ideas if useful.
