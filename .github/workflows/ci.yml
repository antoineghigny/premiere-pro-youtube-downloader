name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-build.txt

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Install backend build dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements-build.txt

      - name: Compile backend modules
        run: python -m compileall backend

      - name: Validate PyInstaller spec
        working-directory: backend
        run: python -m PyInstaller YT2Premiere.spec --noconfirm --clean --distpath dist --workpath build
