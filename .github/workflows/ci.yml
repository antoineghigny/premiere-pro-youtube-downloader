name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test desktop frontend logic
        working-directory: desktop
        run: npm run test

      - name: Test extension logic
        working-directory: extension
        run: npm run test

      - name: Test Rust backend
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Guard extension artifact
        shell: pwsh
        run: |
          $backgroundBundle = 'extension/dist/background.js'
          $manifestFile = 'extension/dist/manifest.json'

          if (Select-String -Quiet -Path $backgroundBundle -Pattern 'socket\.io-client|Could not subscribe to download events|127\.0\.0\.1:3001') {
            throw 'Legacy extension runtime detected in extension/dist/background.js'
          }

          if (Select-String -Quiet -Path $manifestFile -Pattern 'ws://127\.0\.0\.1|ws://localhost') {
            throw 'Legacy WebSocket host permissions detected in extension/dist/manifest.json'
          }

      - name: Build desktop frontend
        working-directory: desktop
        run: npm run build

      - name: Check Rust backend
        working-directory: desktop/src-tauri
        run: cargo check
