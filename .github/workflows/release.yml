name: Package and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download desktop sidecars
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\download-binaries.ps1

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test extension logic
        working-directory: extension
        run: npm run test

      - name: Test desktop frontend logic
        working-directory: desktop
        run: npm run test

      - name: Test Rust backend
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Guard extension artifact
        shell: pwsh
        run: |
          $backgroundBundle = 'extension/dist/background.js'
          $manifestFile = 'extension/dist/manifest.json'

          if (Select-String -Quiet -Path $backgroundBundle -Pattern 'socket\.io-client|Could not subscribe to download events|127\.0\.0\.1:3001') {
            throw 'Legacy extension runtime detected in extension/dist/background.js'
          }

          if (Select-String -Quiet -Path $manifestFile -Pattern 'ws://127\.0\.0\.1|ws://localhost') {
            throw 'Legacy WebSocket host permissions detected in extension/dist/manifest.json'
          }

          if (-not (Select-String -Quiet -Path $manifestFile -Pattern '"key"\s*:')) {
            throw 'Stable extension key is missing from extension/dist/manifest.json'
          }

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run tauri:build

      - name: Stage release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD 'dist\release'
          $chromeExtensionDir = Join-Path $PWD 'dist\chrome-extension'
          $cepExtensionDir = Join-Path $PWD 'dist\cep-extension'

          Remove-Item -Recurse -Force $releaseDir, $chromeExtensionDir, $cepExtensionDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir, $chromeExtensionDir, $cepExtensionDir | Out-Null

          Copy-Item 'extension/dist/*' $chromeExtensionDir -Recurse
          Copy-Item 'cep-extension/*' $cepExtensionDir -Recurse

          Compress-Archive -Path (Join-Path $chromeExtensionDir '*') -DestinationPath (Join-Path $releaseDir 'YT2Premiere-chrome-extension.zip') -Force
          Compress-Archive -Path (Join-Path $cepExtensionDir '*') -DestinationPath (Join-Path $releaseDir 'YT2Premiere-cep-extension.zip') -Force

          Get-ChildItem 'desktop/src-tauri/target/release/bundle/msi/*.msi' | ForEach-Object {
            Copy-Item $_.FullName $releaseDir -Force
          }

          $hashLines = Get-ChildItem $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              '{0}  {1}' -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
            }

          Set-Content (Join-Path $releaseDir 'SHA256SUMS.txt') $hashLines

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/release/*
          compression-level: 0

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --generate-notes --title "$tag"
          fi
