name: Package and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to build and publish (for example v1.2.3). Leave empty to build artifacts only.
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out tagged release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.inputs.release_tag }}

      - name: Check out repository
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.release_tag == ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download desktop sidecars
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\download-binaries.ps1

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test extension logic
        working-directory: extension
        run: npm run test

      - name: Test desktop frontend logic
        working-directory: desktop
        run: npm run test

      - name: Test Rust backend
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Build Firefox extension
        working-directory: extension
        run: npm run build:firefox

      - name: Guard extension artifact
        shell: pwsh
        run: |
          $backgroundBundle = 'extension/dist/background.js'
          $manifestFile = 'extension/dist/manifest.json'
          $firefoxManifestFile = 'extension/dist-firefox/manifest.json'

          if (Select-String -Quiet -Path $backgroundBundle -Pattern 'socket\.io-client|Could not subscribe to download events|127\.0\.0\.1:3001') {
            throw 'Legacy extension runtime detected in extension/dist/background.js'
          }

          if (Select-String -Quiet -Path $manifestFile -Pattern 'ws://127\.0\.0\.1|ws://localhost') {
            throw 'Legacy WebSocket host permissions detected in extension/dist/manifest.json'
          }

          if (-not (Select-String -Quiet -Path $manifestFile -Pattern '"key"\s*:')) {
            throw 'Stable extension key is missing from extension/dist/manifest.json'
          }

          if (Select-String -Quiet -Path $firefoxManifestFile -Pattern '"key"\s*:') {
            throw 'Firefox manifest must not contain the Chrome extension key'
          }

          if (-not (Select-String -Quiet -Path $firefoxManifestFile -Pattern '"browser_specific_settings"\s*:')) {
            throw 'Firefox manifest is missing browser_specific_settings'
          }

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run tauri:build

      - name: Stage release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD 'dist\release'
          $chromeExtensionDir = Join-Path $PWD 'dist\chrome-extension'
          $firefoxExtensionDir = Join-Path $PWD 'dist\firefox-extension'
          $cepExtensionDir = Join-Path $PWD 'dist\cep-extension'

          Remove-Item -Recurse -Force $releaseDir, $chromeExtensionDir, $firefoxExtensionDir, $cepExtensionDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir, $chromeExtensionDir, $firefoxExtensionDir, $cepExtensionDir | Out-Null

          Copy-Item 'extension/dist/*' $chromeExtensionDir -Recurse
          Copy-Item 'extension/dist-firefox/*' $firefoxExtensionDir -Recurse
          Copy-Item 'cep-extension/*' $cepExtensionDir -Recurse

          Compress-Archive -Path (Join-Path $chromeExtensionDir '*') -DestinationPath (Join-Path $releaseDir 'YT2Premiere-chrome-extension.zip') -Force
          Compress-Archive -Path (Join-Path $firefoxExtensionDir '*') -DestinationPath (Join-Path $releaseDir 'YT2Premiere-firefox-extension.zip') -Force
          Compress-Archive -Path (Join-Path $cepExtensionDir '*') -DestinationPath (Join-Path $releaseDir 'YT2Premiere-cep-extension.zip') -Force

          Get-ChildItem 'desktop/src-tauri/target/release/bundle/nsis/*-setup.exe' | ForEach-Object {
            Copy-Item $_.FullName $releaseDir -Force
          }

          Get-ChildItem 'desktop/src-tauri/target/release/bundle/msi/*.msi' | ForEach-Object {
            Copy-Item $_.FullName $releaseDir -Force
          }

          $hashLines = Get-ChildItem $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              '{0}  {1}' -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
            }

          Set-Content (Join-Path $releaseDir 'SHA256SUMS.txt') $hashLines

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/release/*
          compression-level: 0
          if-no-files-found: error
          overwrite: true

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          tag="$RELEASE_TAG"
          repo="$GITHUB_REPOSITORY"
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --repo "$repo" --clobber
          else
            gh release create "$tag" --repo "$repo" --verify-tag --draft --generate-notes --title "$tag"
            gh release upload "$tag" release-assets/* --repo "$repo" --clobber
            gh release edit "$tag" --repo "$repo" --draft=false
          fi
