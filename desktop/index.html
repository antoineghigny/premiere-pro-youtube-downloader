<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>YT2Premiere</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #1a1a1a;
      }

      body {
        overflow: hidden;
        color: #d4d4d4;
        font-family: "Geist Variable", system-ui, sans-serif;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        transition: opacity 220ms ease, visibility 220ms ease;
        z-index: 9999;
      }

      body.boot-complete #boot-splash {
        opacity: 0;
        visibility: hidden;
      }

      .boot-card {
        width: min(560px, calc(100vw - 40px));
        padding: 28px;
        border-radius: 4px;
        border: 1px solid #111111;
        background: #232323;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
      }

      .boot-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .boot-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .boot-logo {
        display: grid;
        place-items: center;
        width: 50px;
        height: 50px;
        border-radius: 4px;
        background: #d69c3a;
        box-shadow: 0 8px 24px rgba(214, 156, 58, 0.2);
        font-size: 20px;
        font-weight: 700;
        color: #1a1a1a;
      }

      .boot-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .boot-subtitle {
        margin: 4px 0 0;
        color: rgba(255, 255, 255, 0.66);
        font-size: 13px;
      }

      .boot-pill {
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        padding: 8px 12px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
      }

      .boot-skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 2px;
        background: #111111;
      }

      .boot-input {
        height: 62px;
        margin-bottom: 18px;
      }

      .boot-row {
        display: grid;
        grid-template-columns: 70px minmax(0, 1fr) 160px;
        gap: 14px;
        margin-top: 12px;
      }

      .boot-thumb {
        height: 54px;
      }

      .boot-main {
        height: 54px;
      }

      .boot-meta {
        height: 54px;
      }

      @keyframes boot-shimmer {
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-card">
        <div class="boot-header">
          <div class="boot-brand">
            <div class="boot-logo">Y2</div>
            <div>
              <p class="boot-title">YT2Premiere</p>
              <p class="boot-subtitle">Preparing your download workspace</p>
            </div>
          </div>
          <div class="boot-pill">Starting</div>
        </div>
        <div class="boot-skeleton boot-input"></div>
        <div class="boot-row">
          <div class="boot-skeleton boot-thumb"></div>
          <div class="boot-skeleton boot-main"></div>
          <div class="boot-skeleton boot-meta"></div>
        </div>
        <div class="boot-row">
          <div class="boot-skeleton boot-thumb"></div>
          <div class="boot-skeleton boot-main"></div>
          <div class="boot-skeleton boot-meta"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
