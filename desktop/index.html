<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>YT2Premiere</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #090b16;
      }

      body {
        overflow: hidden;
        color: white;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(97, 22, 255, 0.28), transparent 34%),
          radial-gradient(circle at bottom right, rgba(32, 201, 151, 0.14), transparent 26%),
          #090b16;
        transition: opacity 220ms ease, visibility 220ms ease;
        z-index: 9999;
      }

      body.boot-complete #boot-splash {
        opacity: 0;
        visibility: hidden;
      }

      .boot-card {
        width: min(560px, calc(100vw - 40px));
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
          rgba(22, 24, 40, 0.88);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 24px 48px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(18px);
      }

      .boot-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .boot-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .boot-logo {
        display: grid;
        place-items: center;
        width: 50px;
        height: 50px;
        border-radius: 18px;
        background: linear-gradient(135deg, #1dd1a1, #6116ff);
        box-shadow: 0 16px 36px rgba(97, 22, 255, 0.32);
        font-size: 20px;
        font-weight: 700;
      }

      .boot-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .boot-subtitle {
        margin: 4px 0 0;
        color: rgba(255, 255, 255, 0.66);
        font-size: 13px;
      }

      .boot-pill {
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        padding: 8px 12px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
      }

      .boot-skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
      }

      .boot-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
        animation: boot-shimmer 1.15s linear infinite;
      }

      .boot-input {
        height: 62px;
        margin-bottom: 18px;
      }

      .boot-row {
        display: grid;
        grid-template-columns: 70px minmax(0, 1fr) 160px;
        gap: 14px;
        margin-top: 12px;
      }

      .boot-thumb {
        height: 54px;
      }

      .boot-main {
        height: 54px;
      }

      .boot-meta {
        height: 54px;
      }

      @keyframes boot-shimmer {
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-card">
        <div class="boot-header">
          <div class="boot-brand">
            <div class="boot-logo">Y2</div>
            <div>
              <p class="boot-title">YT2Premiere</p>
              <p class="boot-subtitle">Preparing your download workspace</p>
            </div>
          </div>
          <div class="boot-pill">Starting</div>
        </div>
        <div class="boot-skeleton boot-input"></div>
        <div class="boot-row">
          <div class="boot-skeleton boot-thumb"></div>
          <div class="boot-skeleton boot-main"></div>
          <div class="boot-skeleton boot-meta"></div>
        </div>
        <div class="boot-row">
          <div class="boot-skeleton boot-thumb"></div>
          <div class="boot-skeleton boot-main"></div>
          <div class="boot-skeleton boot-meta"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
