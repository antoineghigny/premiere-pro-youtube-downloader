<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <script src="./lib/CSInterface.js"></script>
        <script src="./app.js"></script>
        <script type="text/javascript">
            window.onload = function () {
                if (window.__yt2ppServerStarted) {
                    return;
                }
                window.__yt2ppServerStarted = true;

                var csInterface = new CSInterface();
                var extensionRoot = csInterface.getSystemPath(SystemPath.EXTENSION) + "/";

                var child_process = require('child_process');
                var path = require('path');
                var fs = require('fs');

                /*
                // Construct the path to the app.js file
                var appJsPath = path.join(extensionRoot, 'app.js');

                // Execute the app.js script
                child_process.exec('node "' + appJsPath + '"', function(err, stdout, stderr) {
                    if (err) {
                        console.error('Error running app.js:', err);
                        return;
                    }
                    console.log('app.js stdout:', stdout);
                    console.error('app.js stderr:', stderr);
                });
                */
                var http = require('http');

                var hostname = '127.0.0.1';
                var port = 3000;
                var activePortFile = path.join(process.env.APPDATA || '', 'YT2Premiere', 'active_port.json');

                function readBackendPort() {
                    try {
                        if (!fs.existsSync(activePortFile)) {
                            return null;
                        }
                        var data = JSON.parse(fs.readFileSync(activePortFile, 'utf8'));
                        var backendPort = Number(data && data.port);
                        return Number.isInteger(backendPort) ? backendPort : null;
                    } catch (error) {
                        console.error('Could not read backend port file:', error);
                        return null;
                    }
                }

                function registerCepBridge() {
                    var backendPort = readBackendPort();
                    if (!backendPort) {
                        return;
                    }

                    var payload = JSON.stringify({ port: port });
                    var req = http.request({
                        hostname: '127.0.0.1',
                        port: backendPort,
                        path: '/register-cep',
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Content-Length': Buffer.byteLength(payload),
                            'X-YT2PP-CEP': '1'
                        },
                        timeout: 1000
                    }, function(res) {
                        res.resume();
                    });

                    req.on('error', function(error) {
                        console.error('Could not register CEP bridge:', error);
                    });

                    req.on('timeout', function() {
                        req.destroy();
                    });

                    req.write(payload);
                    req.end();
                }

                function handleConnection(req, res){
                    res.statusCode = 200;
                    if(req.method == "GET"){
                        res.setHeader('Content-Type', 'text/plain');
                        res.end('Premiere is alive');
                    }
                    if(req.method == "POST"){
                        var data = []
                        req.on('data', function(chunk){
                            data.push(chunk)
                        })
                        req.on('end', function(){
                            var parsed_data = JSON.parse(data);
                            console.log("\nExtendScript code to be executed :")
                            console.log(parsed_data["to_eval"]);
                            var cs = new CSInterface;
                            cs.evalScript(parsed_data["to_eval"], function(extendScript_return){
                                console.log("ExtendScript sent back :")
                                console.log(extendScript_return);
                                res.setHeader('Content-Type', 'text/plain');
                                res.end(extendScript_return);
                            });
                        })
                    }
                }

                var server = http.createServer(handleConnection);

                server.listen(port, hostname, function(){
                    console.log('Server running at http://' + String(hostname) + ':' + String(port));
                    registerCepBridge();
                    setInterval(registerCepBridge, 30000);
                });
            }
        </script>
    </head>

    <body>
        <div>
            <p>Premiere bridge is ready to receive instructions from YT2Premiere.</p>
        </div>
    </body>
</html>
